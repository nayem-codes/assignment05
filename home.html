<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker | Home Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Daisy Ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-base-200">
    <header class="bg-white shadow-sm w-[95%] max-w-[1440px] mx-auto">
        <div class="navbar  ">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl"><img class="w-8 h-8" src="./assets/github-logo.png" alt=""> GitHub
                    Issues Tracker</a>

            </div>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />

                <button id="search-btn" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>

            </div>
        </div>
    </header>

    <section>
        <div class="flex items-center w-[95%] max-w-7xl mx-auto mt-6 gap-4 bg-white p-4 rounded-lg shadow">
            <button onclick="toggleStyle('all-btn')" id="all-btn" class="btn btn-primary">All</button>
            <button onclick="toggleStyle('open-btn')" id="open-btn" class="btn btn-default">Open</button>
            <button onclick="toggleStyle('closed-btn')" id="closed-btn" class="btn btn-default">Closed</button>
        </div>
    </section>


    <section>
        <div id="issue-count"
            class="w-[95%] max-w-7xl mx-auto mt-6  bg-white p-4 rounded-lg shadow flex justify-between">
            <div class="flex gap-2">
                <img class="bg-violet-100 rounded-full p-2 w-[50px]" src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="text-xl font-semibold"><span id="count">0</span> Issues</h2>
                    <p class="text-gray-600">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center">
                <div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div>
                <p class="mr-4">Open</p>
                <div class="w-3 h-3 rounded-full bg-violet-500 mr-2"></div>
                <p>Closed</p>


            </div>
        </div>
    </section>
    
    <section id="spinner" class="flex justify-center items-center py-10 hidden">
        <span class="loading loading-spinner loading-xl"></span>
    </section>

    <section class="w-[95%] max-w-7xl mx-auto m-0.5 bg-base-100 p-4 rounded-lg shadow">
        <div id="issues-container" class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">



        </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container" class="">




            </div>

            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="script/home.js"></script>
</body>

</html>
